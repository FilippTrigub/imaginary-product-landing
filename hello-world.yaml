# Hello World in YAML
---
message: "Hello, World!"

greetings:
  - language: english
    text: "Hello, World!"
  - language: spanish
    text: "Hola, Mundo!"
  - language: french
    text: "Bonjour, Monde!"
  - language: german
    text: "Guten Tag, Welt!"
  - language: italian
    text: "Ciao, Mondo!"
  - language: japanese
    text: "こんにちは、世界！"
  - language: chinese
    text: "你好，世界！"
  - language: russian
    text: "Привет, мир!"

people:
  - name: Alice
    greeting: "Hello, Alice!"
  - name: Bob
    greeting: "Hello, Bob!"
  - name: Charlie
    greeting: "Hello, Charlie!"

metadata:
  title: "Hello World Collection"
  description: "A collection of greetings in various languages"
  version: "1.0.0"
  author: "Hello World Generator"

# Nested structure example
advanced:
  greeter:
    class: Greeter
    methods:
      - name: greet
        parameters:
          - name: name
            type: string
            default: "World"
        returns: string
        example: "Hello, World!"
      - name: greet_multiple
        parameters:
          - name: names
            type: array
        returns: array
        example:
          - "Hello, Alice!"
          - "Hello, Bob!"
          - "Hello, Charlie!"

# Multi-line string
description: |
  This is a Hello World example in YAML format.
  It demonstrates various YAML features including:
  - Lists
  - Dictionaries
  - Nested structures
  - Multi-line strings
  - Comments

# Inline collections
inline_greetings: ["Hello", "Hi", "Hey", "Greetings"]
inline_names: ["Alice", "Bob", "Charlie"]

# Boolean and numeric values
enabled: true
count: 42
version: 1.0
